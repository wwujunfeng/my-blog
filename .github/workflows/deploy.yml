name: Deploy to Tencent COS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install and Build
        run: |
          npm install
          npm run build

      - name: Install coscli
        run: |
          wget https://cosbrowser.cloud.tencent.com/software/coscli/coscli-linux -O /tmp/coscli
          chmod +x /tmp/coscli

      - name: Upload to COS
        env:
          TENCENT_CLOUD_SECRET_ID: ${{ secrets.TENCENT_CLOUD_SECRET_ID }}
          TENCENT_CLOUD_SECRET_KEY: ${{ secrets.TENCENT_CLOUD_SECRET_KEY }}
        run: |
          /tmp/coscli config set secret_id "$TENCENT_CLOUD_SECRET_ID"
          /tmp/coscli config set secret_key "$TENCENT_CLOUD_SECRET_KEY"
          /tmp/coscli config set region ap-shanghai
          /tmp/coscli cp -r ./dist/ cos://blog-1408692413/ --sync
