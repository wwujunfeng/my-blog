name: Deploy to Tencent COS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install and Build
        run: |
          npm install
          npm run build

      - name: Install coscmd
        run: pip install coscmd

      - name: Configure coscmd
        env:
          TENCENT_CLOUD_SECRET_ID: ${{ secrets.TENCENT_CLOUD_SECRET_ID }}
          TENCENT_CLOUD_SECRET_KEY: ${{ secrets.TENCENT_CLOUD_SECRET_KEY }}
        run: |
          coscmd config -a $TENCENT_CLOUD_SECRET_ID -s $TENCENT_CLOUD_SECRET_KEY -b blog-1408692413 -r ap-shanghai

      - name: Upload to COS
        run: |
          coscmd upload -r ./dist/ /
