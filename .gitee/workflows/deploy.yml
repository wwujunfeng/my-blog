name: Deploy to Tencent COS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: gitee/checkout@v1

      - name: Setup Node.js
        uses: gitee/node@v1
        with:
          version: '20'

      - name: Install and Build
        run: |
          npm install
          npm run build

      - name: Install coscli
        run: |
          wget https://cosbrowser-1253960454.cos.ap-guangzhou.myqcloud.com/coscli/linux/coscli -O /tmp/coscli
          chmod +x /tmp/coscli

      - name: Upload to COS
        env:
          TENCENT_CLOUD_SECRET_ID: ${{ secrets.TENCENT_CLOUD_SECRET_ID }}
          TENCENT_CLOUD_SECRET_KEY: ${{ secrets.TENCENT_CLOUD_SECRET_KEY }}
        run: |
          /tmp/coscli config set secret_id "$TENCENT_CLOUD_SECRET_ID"
          /tmp/coscli config set secret_key "$TENCENT_CLOUD_SECRET_KEY"
          /tmp/coscli config set region ap-shanghai
          /tmp/coscli object upload \
            --bucket blog-1408692413 \
            --local-path ./dist/ \
            --prefix "" \
            --delete-after-upload